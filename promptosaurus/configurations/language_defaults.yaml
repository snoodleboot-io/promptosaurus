# Language-specific default configurations
# Used by FolderSpec for applying sensible defaults based on language

python:
  runtime: "3.14"
  package_manager: "uv"
  test_framework: "pytest"
  linter: "ruff"
  formatter: "ruff"

typescript:
  runtime: "v6.0"
  package_manager: "pnpm"
  test_framework: "vitest"
  linter: "eslint"
  formatter: "prettier"

javascript:
  runtime: "v6.0"
  package_manager: "pnpm"
  test_framework: "vitest"
  linter: "eslint"
  formatter: "prettier"

go:
  runtime: "1.21"
  package_manager: "go mod"
  test_framework: "go test"
  linter: "golangci-lint"
  formatter: "gofmt"

java:
  runtime: "21"
  package_manager: "maven"
  test_framework: "junit"
  linter: "checkstyle"
  formatter: "google-java-format"

rust:
  runtime: "1.75"
  package_manager: "cargo"
  test_framework: "cargo test"
  linter: "clippy"
  formatter: "rustfmt"

csharp:
  runtime: "8.0"
  package_manager: "nuget"
  test_framework: "xunit"
  linter: "roslynator"
  formatter: "dotnet format"

# Default coverage targets applied to all languages
default_coverage:
  line: 80
  branch: 70
  function: 90
  statement: 85
  mutation: 80
  path: 60

# Folder type presets
folder_type_presets:
  backend:
    api:
      language: "python"
      subtype: "api"
    library:
      language: "python"
      subtype: "library"
    worker:
      language: "python"
      subtype: "worker"
    cli:
      language: "python"
      subtype: "cli"
  frontend:
    ui:
      language: "typescript"
      subtype: "ui"
    library:
      language: "typescript"
      subtype: "library"
    e2e:
      language: "typescript"
      subtype: "e2e"
