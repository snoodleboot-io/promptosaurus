# Persona-Based Agent, Workflow, and Skill Mappings
# Reference: planning/current/adrs/ADR-001-persona-based-filtering.md
#
# This file defines which agents, workflows, and skills are available
# to each persona (SDLC role). Users select personas during initialization,
# and the system enables only the content mapped to those personas.

# Universal agents - always available to all personas
universal_agents:
  - ask        # General Q&A and research
  - debug      # Troubleshooting and error resolution
  - explain    # Code walkthroughs and onboarding
  - plan       # Strategic planning and work planning
  - orchestrator  # Multi-step workflow coordination

# Persona definitions
personas:
  software_engineer:
    display_name: "Software Engineer"
    description: "Software development, implementation, and coding"
    focus: "Writing, maintaining, and testing application code"
    
    # PRIMARY agents (core to this role)
    primary_agents:
      - code
      - test
      - refactor
      - migration
    
    # Secondary agents (supportive/cross-cutting)
    secondary_agents:
      - review
      - backend
      - frontend
      - performance
      - enforcement
    
    # Key workflows for this persona
    workflows:
      - code
      - testing
      - feature
      - refactor
      - dependency-upgrade
      - boilerplate
      - code-quality-maintenance
      - coverage-improvement-maintenance
      - automated-testing
    
    # Key skills for this persona
    skills:
      - incremental-implementation
      - code-review-practices
      - testing-strategies
      - debugging-methodology
      - technical-debt-management
      - test-aaa-structure
      - test-mocking-rules
      - test-coverage-categories

  architect:
    display_name: "Architect"
    description: "System design, architecture planning, and technical decisions"
    focus: "Designing scalable systems and making architectural trade-offs"
    
    primary_agents:
      - architect
      - backend
      - frontend
      - data
    
    secondary_agents:
      - performance
    
    workflows:
      - scaffold
      - data-model
      - strategy
      - decision-log
      - component-architecture
      - microservices-architecture
      - api-design
      - database-selection
      - caching-strategy
      - capacity-planning
    
    skills:
      - architecture-documentation
      - technical-decision-making
      - problem-decomposition
      - mermaid-erd-creation
      - data-model-discovery

  qa_tester:
    display_name: "QA / Tester"
    description: "Quality assurance, testing strategy, and test automation"
    focus: "Ensuring quality through comprehensive testing"
    
    primary_agents:
      - test
      - review
    
    secondary_agents:
      - performance
      - enforcement
    
    workflows:
      - testing
      - testing-strategy
      - performance-testing
      - automated-testing
      - coverage-improvement-maintenance
      - review
      - accessibility
    
    skills:
      - testing-strategies
      - test-coverage-categories
      - test-aaa-structure
      - test-mocking-rules
      - code-review-practices
      - quality-assurance

  devops_engineer:
    display_name: "DevOps Engineer"
    description: "Infrastructure, deployment, operations, and CI/CD"
    focus: "Building infrastructure as code and maintaining systems"
    
    primary_agents:
      - code         # Infrastructure-as-Code
      - devops
      - observability
      - incident
    
    secondary_agents:
      - security
      - mlai
      - data
    
    workflows:
      - cicd-pipeline
      - secret-management
      - infrastructure-as-code
      - disaster-recovery
      - container-orchestration
      - observability
      - incident-response
      - postmortem
      - capacity-planning
      - deployment-automation
    
